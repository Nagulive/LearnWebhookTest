version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Password123!
      POSTGRES_DB: hallbookingdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: HallBooking.Api/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=hallbookingdb;Username=postgres;Password=Password123!
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5000:8080"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
